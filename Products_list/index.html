<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GST Billing - Create Invoice</title>

  <!-- Bootstrap CSS -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- External CSS -->

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="main-container">

    <!-- SIDEBAR -->

    <div class="sidebar">

      <div class="logo">
        GST BILLING
      </div>

      <a href="#" class="nav-link-custom">
        <i class="bi bi-house-door"></i>
        Dashboard
      </a>

      <a href="#" class="nav-link-custom active-link">
        <i class="bi bi-receipt"></i>
        Create Invoice
      </a>

      <a href="#" class="nav-link-custom">
        <i class="bi bi-box-seam"></i>
        Products
      </a>

      <a href="#" class="nav-link-custom">
        <i class="bi bi-bar-chart"></i>
        Reports
      </a>

    </div>

    <!-- CONTENT -->

    <div class="content">

      <!-- TOPBAR -->

      <div class="topbar">

        <div>

          <div class="page-title">
            Create Invoice
          </div>

          <div class="page-subtitle">
            Generate GST invoices and manage billing details
          </div>

        </div>

        <button class="btn btn-blue">

          <i class="bi bi-download"></i>

          Export PDF

        </button>

      </div>

      <!-- MAIN CARD -->

      <div class="invoice-card">

        <div class="row g-4">

          <!-- LEFT SECTION -->

          <div class="col-lg-4">

            <h5 class="section-heading">
              Customer Details
            </h5>

            <div class="mb-3">

              <label class="form-label">
                Invoice Number
              </label>

              <input
                type="text"
                class="form-control"
                value="INV-10025"
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                Invoice Date
              </label>

              <input
                type="date"
                class="form-control"
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                Customer Name
              </label>

              <input
                type="text"
                class="form-control"
                placeholder="Enter customer name"
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                GSTIN
              </label>

              <input
                type="text"
                class="form-control"
                placeholder="Enter GST number"
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                Address
              </label>

              <textarea
                class="form-control"
                rows="4"
                placeholder="Enter address"
              ></textarea>

            </div>

          </div>

          <!-- RIGHT SECTION -->

          <div class="col-lg-8">

            <div
              class="d-flex justify-content-between align-items-center mb-4"
            >

              <h5 class="section-heading m-0">
                Product Details
              </h5>

              <button
                class="btn btn-success px-4"
                id="addRow"
              >
                + Add Product
              </button>

            </div>

            <!-- TABLE -->

            <div class="table-container">

              <div class="table-responsive">

                <table
                  class="table table-bordered align-middle text-center"
                  id="invoiceTable"
                >

                  <thead>

                    <tr>

                      <th>Product</th>

                      <th width="110">
                        Qty
                      </th>

                      <th width="140">
                        Price
                      </th>

                      <th width="140">
                        Total
                      </th>

                      <th width="130">
                        Action
                      </th>

                    </tr>

                  </thead>

                  <tbody>

                    <tr>

                      <td>

                        <input
                          type="text"
                          class="form-control product"
                          placeholder="Product name"
                        >

                      </td>

                      <td>

                        <input
                          type="number"
                          class="form-control qty"
                          value="1"
                        >

                      </td>

                      <td>

                        <input
                          type="number"
                          class="form-control price"
                          value="0"
                        >

                      </td>

                      <td class="row-total">
                        ₹0
                      </td>

                      <td>

                        <button
                          class="btn btn-danger removeRow"
                        >
                          Remove
                        </button>

                      </td>

                    </tr>

                  </tbody>

                </table>

              </div>

            </div>

            <!-- SUMMARY -->

            <div class="summary-box">

              <table class="table">

                <tr>

                  <th>Subtotal</th>

                  <td id="subtotal">
                    ₹0
                  </td>

                </tr>

                <tr>

                  <th>CGST (9%)</th>

                  <td id="cgst">
                    ₹0
                  </td>

                </tr>

                <tr>

                  <th>SGST (9%)</th>

                  <td id="sgst">
                    ₹0
                  </td>

                </tr>

                <tr>

                  <th class="grand-total">
                    Grand Total
                  </th>

                  <th
                    class="grand-total"
                    id="grandTotal"
                  >
                    ₹0
                  </th>

                </tr>

              </table>

            </div>

            <!-- BUTTONS -->

            <div class="action-buttons">

              <button
                class="btn btn-secondary btn-cancel"
              >
                Cancel
              </button>

              <button
                class="btn btn-blue btn-save"
              >
                Save Invoice
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- jQuery -->

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- External JavaScript -->

  <script src="script.js"></script>

</body>

</html>
