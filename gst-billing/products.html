<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Billing – Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="products.css">
</head>
<body>

<div class="sidebar">
  <h4 class="logo">GST BILLING</h4>
  <ul>
    <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li><a href="invoice.html"><i class="bi bi-receipt"></i> Create Invoice</a></li>
    <li><a href="products.html" class="active"><i class="bi bi-box-seam"></i> Products</a></li>
    <li><a href="reports.html"><i class="bi bi-bar-chart-line"></i> Reports</a></li>
  </ul>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Products List</h3>
    <button class="btn btn-primary" id="addProductBtn">
      <i class="bi bi-plus-circle"></i> Add Product
    </button>
  </div>

  <table class="table table-bordered table-striped">
    <thead class="table-light">
      <tr>
        <th>#</th>
        <th>Product Name</th>
        <th>HSN/SAC</th>
        <th>Price (₹)</th>
        <th>CGST (%)</th>
        <th>SGST (%)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="products.js"></script>
<script>
  // Add Product button opens a prompt-based flow
  document.getElementById('addProductBtn').addEventListener('click', function() {
    const name  = prompt('Product Name:');   if (!name)  return;
    const hsn   = prompt('HSN/SAC Code:');   if (!hsn)   return;
    const price = prompt('Price (₹):');      if (!price) return;
    const cgst  = prompt('CGST (%):',  '9'); if (!cgst)  return;
    const sgst  = prompt('SGST (%):',  '9'); if (!sgst)  return;
    products.push({ name, hsn, price: parseFloat(price), cgst: parseFloat(cgst), sgst: parseFloat(sgst) });
    loadProducts();
  });
</script>
</body>
</html>
